<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reference | Suporte Técnico Azion</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117; /* Tom levemente diferente para distinguir */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border-left: 4px solid #f36523; 
            background-color: #161b22;
            padding: 40px;
            border-radius: 0 8px 8px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .path-badge {
            background-color: #f36523;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        h1 { margin: 15px 0 5px 0; font-size: 24px; }
        p { color: #8b949e; margin-bottom: 20px; }
        code {
            background: #21262d;
            padding: 5px 10px;
            border-radius: 4px;
            color: #ff7b72;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="path-badge">Subdiretório</span>
        <h1>Área de Referência</h1>
        <p>URI: <code>/reference</code></p>
        <hr style="border: 0; border-top: 1px solid #30363d; margin: 20px 0;">
        <div style="font-size: 13px; color: #58a6ff;">
            Teste de Path-Based Routing - Suporte Azion
        </div>
    </div>
</body>
</html>
