<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Testes | Suporte Técnico Azion</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #090909;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border-top: 4px solid #f36523; /* Laranja Azion */
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }
        p {
            color: #a0a0a0;
            margin-top: 10px;
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px #00ff00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Página de Testes</h1>
        <p>Suporte Técnico - <strong>Azion</strong></p>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <div style="font-size: 14px; color: #00ff00;">
            <span class="status-dot"></span> Online e operacional
        </div>
    </div>
</body>
</html>
